version: 2.1

orbs:
  aws-cli: circleci/aws-cli@5.4.1

jobs:
  deploy:
    docker:
      - image: cimg/node:22.16
    steps:
      - checkout
      - run:
          name: Build TanStack app
          working_directory: web
          command: |
            corepack enable
            pnpm install --frozen-lockfile
            pnpm run build
      - aws-cli/setup:
          role_arn: ${AWS_ROLE_ARN}
          region: ${AWS_REGION}
          role_session_name: circleci-amplify-deploy
      - run:
          name: Set release version from git tag
          command: |
            if [ -z "$CIRCLE_TAG" ]; then
              echo "CIRCLE_TAG is required. Deploy by pushing a git tag (e.g. git tag v1.0.0 && git push origin v1.0.0)"
              exit 1
            fi
            VERSION="$CIRCLE_TAG"
            echo "export VERSION=${VERSION}" >> "$BASH_ENV"
            echo "Deploying version: ${VERSION} (commit ${CIRCLE_SHA1})"
      - run:
          name: Plan deployment
          command: |
            circleci run release plan amplify-hosting \
              --environment-name=production \
              --component-name=web \
              --target-version="${VERSION}"
      - run:
          name: Sync to S3 and deploy to Amplify Hosting
          command: |
            aws s3 sync web/dist/ \
              "s3://${BUCKET_NAME}/releases/${VERSION}/"

            aws amplify start-deployment \
              --app-id "${APP_ID}" \
              --branch-name "${BRANCH_NAME}" \
              --source-url "s3://${BUCKET_NAME}/releases/${VERSION}/" \
              --source-url-type BUCKET_PREFIX

            echo "${VERSION}" | aws s3 cp - \
              "s3://${BUCKET_NAME}/state/current-release.txt"
      - run:
          name: Update planned release to RUNNING
          command: circleci run release update amplify-hosting --status=RUNNING
      - run:
          name: Update planned release to SUCCESS
          command: circleci run release update amplify-hosting --status=SUCCESS
          when: on_success
      - run:
          name: Update planned release to FAILED
          command: |
            if [ -f failure_reason.env ]; then
              source failure_reason.env
            fi
            circleci run release update amplify-hosting \
              --status=FAILED \
              --failure-reason="${FAILURE_REASON:-Deployment failed}"
          when: on_fail

  cancel-deploy:
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Update planned release to CANCELED
          command: circleci run release update amplify-hosting --status=CANCELED

workflows:
  deploy:
    jobs:
      - deploy:
          context: aws-oidc
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - cancel-deploy:
          requires:
            - deploy:
                - canceled
