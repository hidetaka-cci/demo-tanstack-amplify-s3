version: 2.1

orbs:
  aws-cli: circleci/aws-cli@5.1.1

executors:
  deploy-executor:
    docker:
      - image: cimg/node:22.16
    resource_class: large

jobs:
  deploy:
    executor: deploy-executor
    steps:
      - checkout
      - aws-cli/setup:
          role_arn: ${AWS_ROLE_ARN}
          region: ${AWS_REGION}
          role_session_name: "circleci-deploy-${CIRCLE_WORKFLOW_ID}"
      - run:
          name: Install dependencies
          working_directory: web
          command: |
            corepack enable
            pnpm install --frozen-lockfile
      - run:
          name: Build SPA
          working_directory: web
          command: pnpm run build
      - run:
          name: Plan deployment
          command: |
            circleci run release plan amplify-hosting \
              --environment-name=production \
              --component-name=web \
              --target-version=${CIRCLE_TAG}
      - run:
          name: Update release to RUNNING
          command: circleci run release update amplify-hosting --status=RUNNING
      - run:
          name: Archive build artifact to S3 (named by git tag)
          command: |
            tar czf "/tmp/${CIRCLE_TAG}.tar.gz" -C web/dist .
            aws s3 cp "/tmp/${CIRCLE_TAG}.tar.gz" \
              "s3://${BUCKET_NAME}/releases/${CIRCLE_TAG}.tar.gz"
      - run:
          name: Sync to live prefix and deploy to Amplify Hosting
          command: |
            aws s3 sync web/dist/ "s3://${BUCKET_NAME}/live/" --delete

            aws amplify start-deployment \
              --app-id "${APP_ID}" \
              --branch-name "${BRANCH_NAME}" \
              --source-url "s3://${BUCKET_NAME}/live/" \
              --source-url-type BUCKET_PREFIX
      - run:
          name: Mark release as SUCCESS
          command: circleci run release update amplify-hosting --status=SUCCESS
          when: on_success
      - run:
          name: Mark release as FAILED
          command: circleci run release update amplify-hosting --status=FAILED
          when: on_fail

  cancel-deploy:
    executor: deploy-executor
    steps:
      - run:
          name: Mark release as CANCELED
          command: circleci run release update amplify-hosting --status=CANCELED

workflows:
  deploy:
    jobs:
      - deploy:
          context: aws-oidc
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - cancel-deploy:
          context: aws-oidc
          requires:
            - deploy:
              - canceled
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
