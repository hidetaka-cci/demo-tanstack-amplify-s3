version: 2.1

orbs:
  aws-cli: circleci/aws-cli@5.4.1

jobs:
  rollback:
    docker:
      - image: cimg/base:current
    steps:
      - aws-cli/setup:
          role_arn: ${AWS_ROLE_ARN}
          region: ${AWS_REGION}
          role_session_name: circleci-amplify-rollback
      - run:
          name: Plan rollback
          command: |
            TARGET="<< pipeline.deploy.target_version >>"
            circleci run release plan amplify-hosting \
              --environment-name=<< pipeline.deploy.environment_name >> \
              --component-name=<< pipeline.deploy.component_name >> \
              --target-version="${TARGET}" \
              --rollback
      - run:
          name: Roll back to selected version
          command: |
            TARGET="<< pipeline.deploy.target_version >>"
            aws amplify start-deployment \
              --app-id "${APP_ID}" \
              --branch-name "${BRANCH_NAME}" \
              --source-url "s3://${BUCKET_NAME}/releases/${TARGET}/" \
              --source-url-type BUCKET_PREFIX

            echo "${TARGET}" | aws s3 cp - \
              "s3://${BUCKET_NAME}/state/current-release.txt"
      - run:
          name: Update planned release to RUNNING
          command: circleci run release update amplify-hosting --status=RUNNING
      - run:
          name: Update planned release to SUCCESS
          command: circleci run release update amplify-hosting --status=SUCCESS
          when: on_success
      - run:
          name: Update planned release to FAILED
          command: |
            if [ -f failure_reason.env ]; then
              source failure_reason.env
            fi
            circleci run release update amplify-hosting \
              --status=FAILED \
              --failure-reason="${FAILURE_REASON:-Rollback failed}"
          when: on_fail

  cancel-rollback:
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Update planned release to CANCELED
          command: circleci run release update amplify-hosting --status=CANCELED

workflows:
  rollback:
    jobs:
      - rollback:
          context: aws-oidc
      - cancel-rollback:
          requires:
            - rollback:
                - canceled
